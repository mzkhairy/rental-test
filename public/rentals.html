<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Penyewaan - RentSync</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .search-filter-box { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .search-filter-box input, .search-filter-box select { flex: 1; }
    .detail-item { margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); }
    .detail-label { font-weight: 600; color: var(--text-muted); font-size: 0.85rem; display: block; }
    .detail-value { color: var(--text-main); font-size: 0.95rem; word-break: break-all; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">RentSync</div>
    <nav>
      <a href="/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/rentals.html" class="nav-link active">Penyewaan</a>
      <a href="/vehicles.html" class="nav-link">Kendaraan</a>
      <a href="/customers.html" class="nav-link">Pelanggan</a>
      <a href="/employees.html" class="nav-link">Karyawan</a>
      <a href="/transfers.html" class="nav-link">Transfer (P2P)</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left" id="topbar-branch">Loading...</div>
      <div class="topbar-right">
        <div class="notification-bell" id="notif-bell">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <span class="badge" id="notif-badge">0</span>
          <div class="notif-dropdown" id="notif-dropdown">
            <div class="notif-header">Notifikasi Transfer Masuk</div>
            <div class="notif-body" id="notif-body"></div>
          </div>
        </div>
        <div class="user-profile" onclick="logout()" title="Logout">
          <div class="avatar" id="topbar-avatar">U</div>
          <span id="topbar-username">User</span>
        </div>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <h1 class="page-title">Transaksi Penyewaan</h1>
        <button class="btn-primary" style="width: auto;" onclick="openRentalModal()">Buat Transaksi Baru</button>
      </div>

      <div class="search-filter-box" style="display: flex; justify-content: space-between; flex-wrap: wrap;">
        <div style="display: flex; gap: 12px; flex: 1; max-width: 500px;">
          <input type="text" id="searchInput" class="form-control" placeholder="Cari kode rental atau nama pelanggan..." style="width: 100%; max-width: 400px; height: 44px;">
          <button class="btn-primary" style="width: 60px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0;" onclick="renderTable()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </div>
        <div style="display: flex; gap: 12px;">
          <select id="filterStatus" class="form-control" style="height: 44px;" onchange="renderTable()">
            <option value="">Semua Status</option>
            <option value="Pending Payment">Pending Payment</option>
            <option value="Active">Active</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Kode Rental</th>
              <th>Customer</th>
              <th>Kendaraan</th>
              <th>Tanggal Pinjam</th>
              <th>Lama (Hari)</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="table-body">
             <tr><td colspan="7" style="text-align:center">Memuat...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Create Modal -->
  <div id="rentalModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Buat Transaksi Baru</h3>
        <button class="close-btn" onclick="closeRentalModal()">&times;</button>
      </div>
      <form id="rentalForm">
        <div class="form-group">
          <label>Pilih Kendaraan</label>
          <select id="vehicleId" class="form-control" required></select>
        </div>
        <div class="form-group">
          <label>Pilih Customer</label>
          <select id="customerId" class="form-control" required></select>
        </div>
        <div class="form-group">
          <label>Total Hari</label>
          <input type="number" id="totalDays" class="form-control" required min="1" value="1">
        </div>
        <button type="submit" class="btn-primary">Simpan Transaksi</button>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Detail Rental</h3>
        <button class="close-btn" onclick="closeDetailModal()">&times;</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/notifications.js"></script>
  <script>
    let currentData = [];
    let vehicles = [];
    let customers = [];
    
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuth();
      if (!user) return;
      initTopbar();
      loadData();
    });

    async function loadData() {
      try {
        currentData = await apiFetch('/api/rentals');
        renderTable();
      } catch(err) {
        console.error(err);
        document.getElementById('table-body').innerHTML = `<tr><td colspan="7" style="text-align:center;color:red">Error memuat data</td></tr>`;
      }
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');
      
      if (currentData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color: var(--text-muted)">Data penyewaan masih kosong.</td></tr>`;
        return;
      }

      const search = document.getElementById('searchInput').value.toLowerCase();
      const statusFilter = document.getElementById('filterStatus').value;

      const filtered = currentData.filter(r => {
        const custName = r.customerId ? r.customerId.fullName.toLowerCase() : '';
        const matchSearch = r.rentalCode.toLowerCase().includes(search) || custName.includes(search);
        const matchStatus = statusFilter ? r.status === statusFilter : true;
        return matchSearch && matchStatus;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">Penyewaan tidak ada yg cocok.</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      filtered.forEach(r => {
        let statusClass = 'bg-primary';
        if(r.status === 'Completed') statusClass = 'bg-success';
        if(r.status === 'Active') statusClass = 'bg-primary';
        if(r.status === 'Pending Payment') statusClass = 'bg-warning';
        if(r.status === 'Cancelled') statusClass = 'bg-danger';
        
        let actionBtn = `<div style="display: flex; flex-wrap: nowrap; gap: 5px;">
                         <button class="action-btn" onclick="showDetail('${r._id}')">Detail</button>`;
        
        if (r.status === 'Pending Payment') {
          actionBtn += `<button class="action-btn bg-success" onclick="confirmPayment('${r._id}')">Konfirmasi Payment</button>`;
          actionBtn += `<button class="action-btn reject" onclick="cancelRental('${r._id}')">Batalkan Transaksi</button>`;
        } else if (r.status === 'Active') {
          actionBtn += `<button class="action-btn bg-success" onclick="returnVehicle('${r._id}')">Selesaikan Sewa</button>`;
        }
        actionBtn += `</div>`;

        const tr = document.createElement('tr');
        const d = new Date(r.startDate).toLocaleDateString('id-ID');
        tr.innerHTML = `
          <td>${r.rentalCode}</td>
          <td>${r.customerId ? r.customerId.fullName : '-'}</td>
          <td>${r.vehicleId ? r.vehicleId.brand + ' ' + r.vehicleId.model : '-'}</td>
          <td>${d}</td>
          <td>${r.totalDays} hari</td>
          <td><span class="badge-status ${statusClass}">${r.status}</span></td>
          <td>${actionBtn}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function showDetail(id) {
      const item = currentData.find(x => x._id === id);
      if(!item) return;
      const content = document.getElementById('detailContent');
      let html = '';
      for (const [key, value] of Object.entries(item)) {
        html += `<div class="detail-item"><span class="detail-label">${key}</span><span class="detail-value">${JSON.stringify(value)}</span></div>`;
      }
      content.innerHTML = html;
      document.getElementById('detailModal').classList.add('show');
    }
    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('show');
    }

    async function openRentalModal() {
      try {
        vehicles = await apiFetch('/api/vehicles');
        customers = await apiFetch('/api/customers');
        
        const vSelect = document.getElementById('vehicleId');
        vSelect.innerHTML = '<option value="">Pilih Kendaraan (Tersedia)...</option>';
        vehicles.filter(v => v.status === 'Available').forEach(v => {
          vSelect.innerHTML += `<option value="${v._id}">${v.brand} ${v.model} - ${v.plateNumber} (Rp ${v.dailyRate}/hr)</option>`;
        });

        const cSelect = document.getElementById('customerId');
        cSelect.innerHTML = '<option value="">Pilih Customer...</option>';
        customers.forEach(c => {
          cSelect.innerHTML += `<option value="${c._id}">${c.fullName}</option>`;
        });

        document.getElementById('rentalModal').classList.add('show');
      } catch(err) { alert(err.message); }
    }
    
    function closeRentalModal() {
      document.getElementById('rentalModal').classList.remove('show');
    }

    document.getElementById('rentalForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const vehicleId = document.getElementById('vehicleId').value;
      const customerId = document.getElementById('customerId').value;
      const totalDays = document.getElementById('totalDays').value;
      
      const v = vehicles.find(x => x._id === vehicleId);
      const totalPrice = v.dailyRate * totalDays;

      try {
        await apiFetch('/api/rentals', {
          method: 'POST',
          body: JSON.stringify({
            rentalCode: 'RNT-' + Date.now(),
            vehicleId, customerId, totalDays, totalPrice,
            startDate: new Date(),
            expectedReturnDate: new Date(Date.now() + totalDays * 24 * 60 * 60 * 1000)
          })
        });
        closeRentalModal();
        loadData();
        alert('Transaksi berhasil dibuat!');
      } catch(err) { alert(err.message); }
    });

    async function returnVehicle(id) {
      if(!confirm('Konfirmasi penyewaan selesai dan mobil telah dikembalikan?')) return;
      try {
        await apiFetch(`/api/rentals/${id}/return`, { method: 'PUT' });
        alert('Transaksi sewa selesai!');
        loadData();
      } catch(err) { alert(err.message); }
    }

    async function confirmPayment(id) {
      if(!confirm('Konfirmasi pembayaran telah diterima?')) return;
      try {
        await apiFetch(`/api/rentals/${id}/confirm-payment`, { method: 'PUT' });
        alert('Pembayaran berhasil dikonfirmasi!');
        loadData();
      } catch(err) { alert(err.message); }
    }

    async function cancelRental(id) {
      if(!confirm('Anda yakin ingin membatalkan transaksi ini?')) return;
      try {
        await apiFetch(`/api/rentals/${id}/cancel`, { method: 'PUT' });
        alert('Transaksi berhasil dibatalkan!');
        loadData();
      } catch(err) { alert(err.message); }
    }
  </script>
</body>
</html>
