<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kendaraan - RentSync</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .search-filter-box {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .search-filter-box input,
    .search-filter-box select {
      flex: 1;
    }

    .detail-item {
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .detail-label {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.85rem;
      display: block;
    }

    .detail-value {
      color: var(--text-main);
      font-size: 0.95rem;
      word-break: break-all;
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-logo">RentSync</div>
    <nav>
      <a href="/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/rentals.html" class="nav-link">Penyewaan</a>
      <a href="/vehicles.html" class="nav-link active">Kendaraan</a>
      <a href="/customers.html" class="nav-link">Pelanggan</a>
      <a href="/employees.html" class="nav-link">Karyawan</a>
      <a href="/notifications.html" class="nav-link">Notifikasi</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left" id="topbar-branch">Loading...</div>
      <div class="topbar-right">
        <div class="notification-bell" id="notif-bell">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="badge" id="notif-badge">0</span>
          <div class="notif-dropdown" id="notif-dropdown">
            <div class="notif-header">Notifikasi</div>
            <div class="notif-body" id="notif-body"></div>
          </div>
        </div>
        <div class="user-profile" onclick="logout()" title="Logout">
          <div class="avatar" id="topbar-avatar">U</div>
          <span id="topbar-username">User</span>
        </div>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <h1 class="page-title">Daftar Kendaraan</h1>
        <button class="btn-primary" style="width: auto;" onclick="openModal()">+ Tambah Kendaraan</button>
      </div>

      <div class="search-filter-box" style="display: flex; justify-content: space-between; flex-wrap: wrap;">
        <div style="display: flex; gap: 12px; flex: 1; max-width: 500px;">
          <input type="text" id="searchInput" class="form-control" placeholder="Cari merk, model, atau plat nomor..."
            style="width: 100%; max-width: 400px; height: 44px;">
          <button class="btn-primary"
            style="width: 60px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0;"
            onclick="renderTable()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </div>
        <div style="display: flex; gap: 12px;">
          <select id="filterCategory" class="form-control" style="height: 44px;" onchange="renderTable()">
            <option value="">Semua Kategori</option>
            <option value="MPV">MPV</option>
            <option value="SUV">SUV</option>
            <option value="Sedan">Sedan</option>
            <option value="Hatchback">Hatchback</option>
          </select>
          <select id="filterStatus" class="form-control" style="height: 44px;" onchange="renderTable()">
            <option value="">Semua Status</option>
            <option value="Available">Available</option>
            <option value="Booked">Booked</option>
            <option value="Rented">Rented</option>
            <option value="Rented by Request">Rented by Request</option>
            <option value="Transfer">Transfer</option>
            <option value="Maintenance">Maintenance</option>
          </select>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Kode</th>
              <th>Plat Nomor</th>
              <th>Merk/Model</th>
              <th>Kategori</th>
              <th>Cabang Asal</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td colspan="7" style="text-align:center">Memuat...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal Form -->
  <div id="crudModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Tambah Kendaraan</h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <form id="crudForm">
        <input type="hidden" id="vehId">
        <div class="form-group">
          <label>Kode Kendaraan</label>
          <input type="text" id="vehicleCode" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Plat Nomor</label>
          <input type="text" id="plateNumber" class="form-control" required>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="form-group" style="flex:1;">
            <label>Brand</label>
            <input type="text" id="brand" class="form-control" required>
          </div>
          <div class="form-group" style="flex:1;">
            <label>Model</label>
            <input type="text" id="model" class="form-control" required>
          </div>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="form-group" style="flex:1;">
            <label>Tahun</label>
            <input type="number" id="year" class="form-control" required>
          </div>
          <div class="form-group" style="flex:1;">
            <label>Tarif Harian</label>
            <input type="number" id="dailyRate" class="form-control" required>
          </div>
        </div>
        <div class="form-group">
          <label>Kategori</label>
          <select id="category" class="form-control" required>
            <option value="MPV">MPV</option>
            <option value="SUV">SUV</option>
            <option value="Sedan">Sedan</option>
            <option value="Hatchback">Hatchback</option>
          </select>
        </div>
        <div class="form-group">
          <label>Transmisi</label>
          <select id="transmission" class="form-control" required>
            <option value="Automatic">Automatic</option>
            <option value="Manual">Manual</option>
          </select>
        </div>
        <div class="form-group">
          <label>Kapasitas Kursi</label>
          <input type="number" id="seatCapacity" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="status" class="form-control" required>
            <option value="Available">Available</option>
            <option value="Maintenance">Maintenance</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Simpan</button>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Detail Kendaraan</h3>
        <button class="close-btn" onclick="closeDetailModal()">&times;</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/notifications.js"></script>
  <script>
    let currentData = [];
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuth();
      if (!user) return;
      initTopbar();
      loadData();
    });

    async function loadData() {
      try {
        currentData = await apiFetch('/api/vehicles');
        renderTable();
      } catch (err) {
        console.error('Error memuat data kendaraan:', err);
        document.getElementById('table-body').innerHTML = `<tr><td colspan="7" style="text-align:center;color:red;">Error memuat data.</td></tr>`;
      }
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');

      if (currentData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color: var(--text-muted)">Data kendaraan masih kosong.</td></tr>`;
        return;
      }

      const search = document.getElementById('searchInput').value.toLowerCase();
      const catFilter = document.getElementById('filterCategory').value;
      const statusFilter = document.getElementById('filterStatus').value;

      const filtered = currentData.filter(v => {
        const str = `${v.brand} ${v.model} ${v.plateNumber}`.toLowerCase();
        const matchSearch = str.includes(search);
        const matchCat = catFilter ? v.category === catFilter : true;
        const matchStatus = statusFilter ? v.status === statusFilter : true;
        return matchSearch && matchCat && matchStatus;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center">Kendaraan tidak ada yg cocok.</td></tr>`;
        return;
      }

      tbody.innerHTML = '';
      filtered.forEach(v => {
        let statusClass = 'bg-primary';
        if (v.status === 'Available') statusClass = 'bg-success';
        if (v.status === 'Rented') statusClass = 'bg-warning';
        if (v.status === 'Transfer') statusClass = 'bg-danger';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${v.vehicleCode}</td>
          <td>${v.plateNumber}</td>
          <td>${v.brand} ${v.model} (${v.year})</td>
          <td>${v.category}</td>
          <td>${v.homeBranch}</td>
          <td><span class="badge-status ${statusClass}">${v.status}</span></td>
          <td>
            <div style="display: flex; flex-wrap: nowrap; gap: 5px;">
              <button class="action-btn" onclick="showDetail('${v._id}')">Detail</button>
              ${(v.status === 'Available' || v.status === 'Maintenance') ? `
              <button class="action-btn" onclick="openModal('${v._id}')">Edit</button>
              <button class="action-btn reject" onclick="deleteData('${v._id}')">Hapus</button>
              ` : ''}
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function showDetail(id) {
      const item = currentData.find(x => x._id === id);
      if (!item) return;
      const content = document.getElementById('detailContent');
      let html = '';
      for (const [key, value] of Object.entries(item)) {
        html += `<div class="detail-item"><span class="detail-label">${key}</span><span class="detail-value">${JSON.stringify(value)}</span></div>`;
      }
      content.innerHTML = html;
      document.getElementById('detailModal').classList.add('show');
    }
    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('show');
    }

    function openModal(id = null) {
      const form = document.getElementById('crudForm');
      form.reset();
      document.getElementById('vehId').value = id || '';
      document.getElementById('modalTitle').textContent = id ? 'Edit Kendaraan' : 'Tambah Kendaraan';

      if (id) {
        const item = currentData.find(x => x._id === id);
        if (item) {
          document.getElementById('vehicleCode').value = item.vehicleCode;
          document.getElementById('plateNumber').value = item.plateNumber;
          document.getElementById('brand').value = item.brand;
          document.getElementById('model').value = item.model;
          document.getElementById('year').value = item.year;
          document.getElementById('dailyRate').value = item.dailyRate;
          document.getElementById('category').value = item.category;
          document.getElementById('transmission').value = item.transmission;
          document.getElementById('seatCapacity').value = item.seatCapacity;
          document.getElementById('status').value = item.status;

          if (item.status === 'Rented' || item.status === 'Transfer' || item.status === 'Booked') {
            if (!Array.from(document.getElementById('status').options).some(opt => opt.value === item.status)) {
              const opt = document.createElement('option');
              opt.value = item.status;
              opt.text = item.status;
              document.getElementById('status').appendChild(opt);
            }
            document.getElementById('status').value = item.status;
          }

          if (item.status === 'Rented' || item.status === 'Booked') {
            document.getElementById('status').disabled = true;
          } else {
            document.getElementById('status').disabled = false;
          }
        }
      } else {
        document.getElementById('vehicleCode').value = 'V-' + Date.now();
        document.getElementById('status').disabled = false;
      }
      document.getElementById('crudModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('crudModal').classList.remove('show');
    }

    document.getElementById('crudForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('vehId').value;
      const payload = {
        vehicleCode: document.getElementById('vehicleCode').value,
        plateNumber: document.getElementById('plateNumber').value,
        brand: document.getElementById('brand').value,
        model: document.getElementById('model').value,
        year: document.getElementById('year').value,
        dailyRate: document.getElementById('dailyRate').value,
        category: document.getElementById('category').value,
        transmission: document.getElementById('transmission').value,
        seatCapacity: document.getElementById('seatCapacity').value,
        status: document.getElementById('status').value,
      };

      try {
        if (id) {
          await apiFetch(`/api/vehicles/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          await apiFetch('/api/vehicles', { method: 'POST', body: JSON.stringify(payload) });
        }
        closeModal();
        loadData();
      } catch (err) {
        console.error('Error save:', err);
        alert(err.message);
      }
    });

    async function deleteData(id) {
      if (!confirm('Yakin hapus data ini?')) return;
      try {
        await apiFetch(`/api/vehicles/${id}`, { method: 'DELETE' });
        loadData();
      } catch (err) {
        console.error('Error delete:', err);
        alert(err.message);
      }
    }
  </script>
</body>

</html>
